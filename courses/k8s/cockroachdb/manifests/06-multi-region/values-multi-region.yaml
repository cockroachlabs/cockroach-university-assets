# Helm values.yaml for locality-aware CockroachDB deployment
#
# The CockroachDB Operator (Preview) maps regions[].code to --locality
# flags automatically. Each region entry corresponds to a K8s cluster.
#
# In production, a multi-region deployment uses multiple regions:
#   regions:
#     - code: "us-east1"
#       nodes: 3
#     - code: "eu-west1"
#       nodes: 3
#     - code: "ap-southeast1"
#       nodes: 3
#
# For this single-node lab, we deploy one node in a single region to
# demonstrate locality concepts without multi-cluster infrastructure.
cockroachdb:
  crdbCluster:
    image:
      name: us-docker.pkg.dev/cockroach-cloud-images/cockroachdb/cockroach:v26.1.3
    dataStore:
      volumeClaimTemplate:
        spec:
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 10Gi
    regions:
      - code: "us-east1"
        nodes: 1
        namespace: cockroachdb
        cloudProvider: GKE
    podTemplate:
      spec:
        resources:
          requests:
            cpu: "500m"
            memory: "2Gi"
          limits:
            cpu: "2"
            memory: "4Gi"
    additionalArgs:
      - --cache=25%
      - --max-sql-memory=25%
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: ScheduleAnyway
