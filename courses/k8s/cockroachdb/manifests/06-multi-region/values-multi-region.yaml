# Helm values.yaml for locality-aware CockroachDB deployment
#
# In production, use regions[] to auto-map locality. The Operator reads
# regions[].code and passes --locality=region=<code> to each node.
#
# For this single-node lab, we pass --locality via additionalArgs instead
# of using regions[], because regions[] triggers a hard pod anti-affinity
# that prevents multiple pods on the same node.
#
# Production multi-region reference (requires one Operator per K8s cluster):
#   regions:
#     - code: "us-east1"
#       nodes: 3
#       namespace: cockroachdb
#       cloudProvider: GKE
#     - code: "eu-west1"
#       nodes: 3
#       namespace: cockroachdb
#       cloudProvider: GKE
#     - code: "ap-southeast1"
#       nodes: 3
#       namespace: cockroachdb
#       cloudProvider: GKE
cockroachdb:
  crdbCluster:
    image:
      name: cockroachdb/cockroach:v26.1.3
    dataStore:
      volumeClaimTemplate:
        spec:
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 10Gi
    nodes: 3
    podTemplate:
      spec:
        resources:
          requests:
            cpu: "500m"
            memory: "2Gi"
          limits:
            cpu: "2"
            memory: "4Gi"
    additionalArgs:
      - --locality=region=us-east1,zone=us-east1-b
      - --cache=25%
      - --max-sql-memory=25%
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: ScheduleAnyway
