# Helm values.yaml: 6-node CockroachDB cluster for scaling exercises
#
# Used in the operator-scaling lab to demonstrate:
#   1. Scale from 3 to 6 nodes using helm upgrade
#   2. The Operator creates 3 new pods (via CrdbNode CRDs)
#   3. New nodes join the cluster automatically
#   4. Ranges rebalance across all 6 nodes
#
# Scale up:
#   helm upgrade cockroachdb charts/cockroachdb -n cockroachdb --reuse-values \
#     --set cockroachdb.crdbCluster.regions[0].nodes=6
#
# Scale down:
#   helm upgrade cockroachdb charts/cockroachdb -n cockroachdb --reuse-values \
#     --set cockroachdb.crdbCluster.regions[0].nodes=3
cockroachdb:
  crdbCluster:
    image:
      name: cockroachdb/cockroach:v26.1.3
    dataStore:
      volumeClaimTemplate:
        spec:
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 10Gi
    regions:
      - code: "us-east1"
        nodes: 6
        namespace: cockroachdb
        cloudProvider: GKE
    podTemplate:
      spec:
        resources:
          requests:
            cpu: "500m"
            memory: "2Gi"
          limits:
            cpu: "2"
            memory: "4Gi"
    additionalArgs:
      - --cache=25%
      - --max-sql-memory=25%
