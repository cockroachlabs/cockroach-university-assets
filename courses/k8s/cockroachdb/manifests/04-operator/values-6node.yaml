# Helm values.yaml: 6-node CockroachDB cluster for scaling exercises
#
# Used in the operator-scaling lab to demonstrate:
#   1. Scale from 3 to 6 nodes using helm upgrade
#   2. The Operator creates 3 new pods (via CrdbNode CRDs)
#   3. New nodes join the cluster automatically
#   4. Ranges rebalance across all 6 nodes
#
# Scale up:
#   helm upgrade cockroachdb charts/cockroachdb -n cockroachdb \
#     -f values-6node.yaml
cockroachdb:
  crdbCluster:
    image:
      name: us-docker.pkg.dev/cockroach-cloud-images/cockroachdb/cockroach:v26.1.3
    dataStore:
      volumeClaimTemplate:
        spec:
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 10Gi
    regions:
      - code: "us-east1"
        nodes: 6
        namespace: cockroachdb
        cloudProvider: k3d
    podTemplate:
      spec:
        containers:
          - name: cockroachdb
            resources:
              requests:
                cpu: "250m"
                memory: "1Gi"
              limits:
                cpu: "1"
                memory: "2Gi"
        topologySpreadConstraints:
          - maxSkew: 1
            topologyKey: topology.kubernetes.io/zone
            whenUnsatisfiable: ScheduleAnyway
        affinity:
          podAntiAffinity:
            preferredDuringSchedulingIgnoredDuringExecution:
              - weight: 1
                podAffinityTerm:
                  labelSelector:
                    matchExpressions:
                      - key: app.kubernetes.io/name
                        operator: In
                        values:
                          - cockroachdb
                  topologyKey: kubernetes.io/hostname
    additionalArgs:
      - --cache=25%
      - --max-sql-memory=25%
