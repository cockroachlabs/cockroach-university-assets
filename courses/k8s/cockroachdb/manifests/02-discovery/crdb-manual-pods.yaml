# Manual Pod + PVC deployment of CockroachDB (without the Operator)
# Demonstrates what the Operator automates: stable pod names,
# dedicated PVCs, and DNS-based discovery via a headless Service.
#
# Each pod gets a fixed name: cockroachdb-0, cockroachdb-1, cockroachdb-2
# Combined with the headless Service, each pod is reachable at:
#   cockroachdb-0.cockroachdb.default.svc.cluster.local:26257
#
# NOTE: The v26.2 Operator creates CrdbNode CRDs that manage a Pod + PVC
# pair automatically. This manifest shows the raw resources for educational
# purposes — never deploy CockroachDB this way in production.
---
# PVC for cockroachdb-0
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: datadir-cockroachdb-0
  labels:
    app: cockroachdb
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
# PVC for cockroachdb-1
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: datadir-cockroachdb-1
  labels:
    app: cockroachdb
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
# PVC for cockroachdb-2
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: datadir-cockroachdb-2
  labels:
    app: cockroachdb
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
# Pod cockroachdb-0
apiVersion: v1
kind: Pod
metadata:
  name: cockroachdb-0
  labels:
    app: cockroachdb
spec:
  hostname: cockroachdb-0
  subdomain: cockroachdb
  terminationGracePeriodSeconds: 300
  containers:
    - name: cockroachdb
      image: cockroachdb/cockroach:v26.1.3
      command:
        - cockroach
        - start
        - --insecure
        - --logtostderr=WARNING
        - --join=cockroachdb-0.cockroachdb:26257,cockroachdb-1.cockroachdb:26257,cockroachdb-2.cockroachdb:26257
        - --advertise-addr=cockroachdb-0.cockroachdb
      ports:
        - containerPort: 26257
          name: grpc
        - containerPort: 8080
          name: http
      volumeMounts:
        - name: datadir
          mountPath: /cockroach/cockroach-data
      resources:
        requests:
          cpu: "500m"
          memory: "2Gi"
        limits:
          cpu: "2"
          memory: "4Gi"
      livenessProbe:
        httpGet:
          path: /health
          port: http
        initialDelaySeconds: 30
        periodSeconds: 10
      readinessProbe:
        httpGet:
          path: /health?ready=1
          port: http
        initialDelaySeconds: 10
        periodSeconds: 5
  volumes:
    - name: datadir
      persistentVolumeClaim:
        claimName: datadir-cockroachdb-0
---
