# Secure SQL client pod with TLS certificates
#
# This pod mounts the CockroachDB root client certificates from K8s Secrets
# created by the Operator's self-signer. The projected volume combines:
#   - ca.crt from crdb-cockroachdb-ca-secret (CA certificate)
#   - client.root.crt and client.root.key from crdb-cockroachdb-client-secret
#
# The cockroachdb-client label allows this pod through the NetworkPolicy.
apiVersion: v1
kind: Pod
metadata:
  name: cockroachdb-client
  labels:
    app: cockroachdb-client
    cockroachdb-client: "true"
spec:
  containers:
    - name: cockroachdb-client
      image: cockroachdb/cockroach:v26.1.3
      command:
        - sleep
        - "infinity"
      volumeMounts:
        - name: client-certs
          mountPath: /cockroach/cockroach-certs
          readOnly: true
  terminationGracePeriodSeconds: 0
  volumes:
    - name: client-certs
      projected:
        sources:
          - secret:
              name: crdb-cockroachdb-ca-secret
              items:
                - key: ca.crt
                  path: ca.crt
          - secret:
              name: crdb-cockroachdb-client-secret
              items:
                - key: tls.crt
                  path: client.root.crt
                - key: tls.key
                  path: client.root.key
        defaultMode: 0400
